<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Hari Raya Idul Fitri ke 1447 H✨</title>
    <style>
        /* Latar Belakang Gradasi Pastel */
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #FFB7C5, #9ADF8F, #AEC6CF); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            text-align: center; 
            padding: 20px; 
            box-sizing: border-box;
            overflow-x: hidden;
        }
        
        /* Kartu Ucapan Transparan (Glassmorphism) */
        .card { 
            background: rgba(255, 255, 255, 0.25); 
            padding: 35px 25px; 
            border-radius: 40px; 
            border: 3px solid white; 
            backdrop-filter: blur(15px); 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            animation: bounceIn 1.2s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Gaya Stiker Wajah Anda */
        .photo-stiker {
            width: 85%; 
            max-width: 250px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            animation: float 3s infinite ease-in-out;
            margin-bottom: 20px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }

        h1 { 
            color: #fff; 
            text-shadow: 2px 2px 8px rgba(0,0,0,0.2); 
            font-size: 24px; 
            margin-bottom: 15px; 
        }
        
        /* Kotak Pantun */
        .pantun-box { 
            color: #fff; 
            font-size: 15px; 
            line-height: 1.6; 
            background: rgba(255, 255, 255, 0.2); 
            padding: 20px; 
            border-radius: 25px; 
            margin-bottom: 25px; 
            font-style: italic;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .pesan-utama { 
            color: #fff; 
            font-size: 19px; 
            font-weight: bold; 
            margin-bottom: 10px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }
        
        .footer { 
            font-size: 13px; 
            color: #fff; 
            opacity: 0.8; 
            margin-top: 20px;
        }

        /* Tombol Interaktif */
        .btn-wa {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: white;
            color: #4ECDC4;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn-wa:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="card">
        <img src="0be9914e-77ff-4d43-8f20-9e8c7a3e798f.png" class="photo-stiker" alt="Selamat Lebaran">
        
        <h1>Selamat Idul Fitri 1447 H</h1>
        
        <div class="pantun-box">
            Makan ketupat di rumah Pak Camat,<br>
            Ditambah opor bumbunya pekat.<br>
            Walau kita jarang terlihat,<br>
            Maaf lahir batin tetap terikat! 🌙✨
        </div>

        <div class="pesan-utama">
            Minal Aidin Wal Faizin<br>
            Mohon Maaf Lahir & Batin 🙏
        </div>

        <div class="footer">Semoga apa yang kita jalani selalu dapat keberkahan dari allah swt.</div>
        
        <a href="#" class="btn-wa" onclick="alert('Terima kasih, sangat bersedia menerima thr hehe❤️, bisa lewat dana atau gopay langsung saja di kirim lewat no ini ya hehehe')">Klik Pesan Damai</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebaran Ceria ✨</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #FFB7C5, #AEC6CF); /* Warna pastel meriah */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Kartu Utama Bergetar Gemas */
        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 40px;
            border: 5px solid #fff;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            width: 85%;
            max-width: 450px;
            position: relative;
            animation: bounceIn 1.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Stiker Animasi Masjid */
        .sticker {
            width: 150px;
            height: 150px;
            margin: 0 auto;
            display: block;
        }

        /* Teks */
        h1 {
            color: #fff;
            font-size: 32px;
            text-shadow: 2px 2px 0px #FFB7C5;
            margin: 10px 0;
        }

        p {
            color: #fff;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Tombol Spesial */
        .btn-celebrate {
            background: #fff;
            color: #FFB7C5;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
            position: relative;
        }

        .btn-celebrate:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }

        /* Stiker Ketupat Tambahan Melayang */
        .ketupat {
            position: absolute;
            width: 50px;
            height: 50px;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(15deg); }
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="card">
        <lottie-player class="ketupat" style="top: -20px; left: -20px;" src="https://assets10.lottiefiles.com/packages/lf20_m6h6h7e8.json" background="transparent" speed="1" loop autoplay></lottie-player>
        <lottie-player class="ketupat" style="top: 20px; right: -20px;" src="https://assets10.lottiefiles.com/packages/lf20_m6h6h7e8.json" background="transparent" speed="1.2" loop autoplay></lottie-player>

        <lottie-player class="sticker" src="https://assets10.lottiefiles.com/packages/lf20_m6h6h7e8.json" background="transparent" speed="1" loop autoplay></lottie-player>
        
        <h1>Selamat Idul Fitri!</h1>
        <p>Beli baju baru di pasar raya,<br>Jangan lupa beli kopiahnya.<br>Salah dan khilaf mohon dimaafkan ya,<br>Agar lebaran makin bahagia! 🥳</p>
        
        <button class="btn-celebrate" onclick="celebrate()">Klik Untuk Pesta!</button>
        
        <div id="pesan-spesial" style="display:none; margin-top:20px; color:#fff; font-weight:bold; font-size: 20px; animation: fadeIn 1s;">
            Minal Aidin Wal Faizin! <br> Makan ketupat, jangan lupa bagi THR! 😂🌙
        </div>
    </div>

    <script>
        function celebrate() {
            document.getElementById('pesan-spesial').style.display = 'block';
            document.querySelector('.btn-celebrate').style.display = 'none';
        }
    </script>
</body>
</html>

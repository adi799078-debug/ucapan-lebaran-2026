<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebaran Seru 🌙</title>
    <style>
        body { margin: 0; background: #0f2027; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; text-align: center; }
        .stars { position: absolute; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #243b55, #0f2027); }
        .card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; border: 2px solid #ffd700; animation: bounce 2s infinite; }
        h1 { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        button { background: #ffd700; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="card">
        <div style="font-size: 50px;">🕌</div>
        <h1>Selamat Idul Fitri!</h1>
        <p>Beli baju baru di pasar raya,<br>Jangan lupa beli kopiahnya.<br>Salah dan khilaf mohon dimaafkan ya,<br>Agar lebaran makin bahagia!</p>
        <button onclick="alert('Maaf Lahir & Batin ya! Selamat makan ketupat! 🥳')">Klik Pesan</button>
    </div>
</body>
</html>

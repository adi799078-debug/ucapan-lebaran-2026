<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebaran Berkah 🌙</title>
    <style>
        body { margin: 0; background: #0f2027; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; text-align: center; }
        .bg-stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #243b55, #0f2027); }
        
        /* Stiker Melayang */
        .sticker { font-size: 80px; margin-bottom: 10px; animation: float 3s infinite ease-in-out; display: inline-block; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(10deg); } }
        
        .card { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 30px; border: 3px solid #ffd700; backdrop-filter: blur(10px); box-shadow: 0 0 20px #ffd700; width: 80%; max-width: 400px; }
        h1 { color: #ffd700; text-shadow: 0 0 15px #ffd700; margin: 10px 0; font-size: 24px; }
        p { font-size: 16px; line-height: 1.6; color: #f0f0f0; }
        
        .btn { background: #ffd700; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; color: #0f2027; transition: 0.3s; }
        .btn:hover { transform: scale(1.1); background: #fff; }

        /* Animasi Bintang Kelap-kelip */
        .dot { position: absolute; background: white; border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="bg-stars"></div>
    <div class="dot" style="top:20%; left:10%; width:2px; height:2px;"></div>
    <div class="dot" style="top:50%; left:80%; width:3px; height:3px; animation-delay:1s;"></div>
    <div class="dot" style="top:80%; left:30%; width:2px; height:2px; animation-delay:0.5s;"></div>

    <div class="card">
        <div class="sticker">🕌✨</div>
        <h1>Selamat Idul Fitri 1447 H</h1>
        <p>Beli baju baru di pasar raya,<br>Jangan lupa beli kopiahnya.<br>Salah dan khilaf mohon dimaafkan ya,<br>Agar lebaran makin bahagia! 🤲</p>
        <button class="btn" onclick="tampilkanPesan()">Klik Untuk Kamu</button>
        <div id="pesan" style="display:none; margin-top:20px; color:#ffd700; font-weight:bold; animation: fadeIn 1s;">
            Ngaturaken sedoyo kalepatan kulo, kulo katah lepat nyuwun pangapunten.
            Minal Aidin Wal Faizin! <br> Semoga berkah melimpah untukmu. 🌙⭐
        </div>
    </div>

    <script>
        function tampilkanPesan() {
            document.getElementById('pesan').style.display = 'block';
            document.querySelector('.btn').style.display = 'none';
        }
    </script>
</body>
</html>
